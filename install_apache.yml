---

- hosts: all
  become: true
  tasks:
 
  - name: Install Apache2 Package
    apt:
      name:
        - apache2
        - libapache2-mod-php 
      state: latest
      update_cache: yes
    when: ansible_distribution == "Ubuntu"

  - name: install Apache and PHP for CentOS
    dnf:
      name:
        - httpd
        -  libapache2-mod-php
      update_cache: yes
     when: ansible_distribution == CentOS
